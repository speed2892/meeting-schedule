<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="집회 임명표">
<meta name="theme-color" content="#1a3a5c">
<link rel="manifest" id="pwaManifest">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc, getDoc }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBJhyjHqsUmCnkt574KuW8nPAI3erqy1Wk",
  authDomain: "meeting-program-362a0.firebaseapp.com",
  projectId: "meeting-program-362a0",
  storageBucket: "meeting-program-362a0.firebasestorage.app",
  messagingSenderId: "388495091240",
  appId: "1:388495091240:web:c8f635f393dcb6f46cf71d"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const REF = doc(db, 'congregation', 'gyeongju-east-schedule');

let _saveTimer = null;
window.fbSave = function(){
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async ()=>{
    try{
      await setDoc(REF, {D: window.D, W: window.WELCOME, updatedAt: Date.now()});
      window._fbStatus('☁️ 저장됨');
    } catch(e){ window._fbStatus('⚠ 저장 실패'); }
  }, 1500);
};

onSnapshot(REF, snap=>{
  if(window._fbIgnore){ window._fbIgnore=false; return; }
  if(!snap.exists()) return;
  const data = snap.data();
  if(data.D) window.D = data.D;
  if(data.W) window.WELCOME = data.W;
  localStorage.setItem(window._SK, JSON.stringify({D: window.D, W: window.WELCOME}));
  if(window.renderAll) window.renderAll();
  window._fbStatus('🔄 동기화됨');
}, err=>{ window._fbStatus('⚠ 연결 오류'); });

window._fbReady = async function(){
  try {
    window._fbStatus('⏳ 불러오는 중...');
    const snap = await getDoc(REF);
    if(snap.exists()){
      const data = snap.data();
      if(data.D) window.D = data.D;
      if(data.W) window.WELCOME = data.W || [];
      localStorage.setItem(window._SK, JSON.stringify({D: window.D, W: window.WELCOME}));
      window._fbStatus('☁️ Firebase 연결됨');
    } else {
      const local = localStorage.getItem(window._SK);
      if(local){ try{ const p=JSON.parse(local); window.D=p.D||window.D; window.WELCOME=p.W||[]; }catch(e){} }
      await setDoc(REF, {D: window.D, W: window.WELCOME, updatedAt: Date.now()});
      window._fbStatus('☁️ 초기 업로드 완료');
    }
  } catch(e){
    const local = localStorage.getItem(window._SK);
    if(local){ try{ const p=JSON.parse(local); window.D=p.D||window.D; window.WELCOME=p.W||[]; }catch(e2){} }
    window._fbStatus('📴 오프라인 모드');
  }
  const today = new Date().toISOString().slice(0,10);
  let best=0;
  window.D.forEach((w,i)=>{ if(w.startDate && w.startDate<=today) best=i; });
  window.curWeekIdx = best;
  if(window.renderAll) window.renderAll();
};
window.dispatchEvent(new Event('fbready'));
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
:root{
  --navy:#1a3a5c;--gold:#c8a040;--gold2:#f0c040;
  --bg:#f0f2f5;--card:#fff;--border:#e0d8cc;
  --text:#1a1510;--text2:#555;--text3:#999;
  --surface2:#f9f7f3;--surface3:#f2eeea;
  --jewel:#ddeeff;--service:#e8f5e9;--life:#fff8e1;
  --jewel-c:#1a3a5c;--service-c:#2e7d32;--life-c:#b45000;
  --tab-h:52px;--hdr-h:56px;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);margin:0;padding:0;min-height:100dvh;overflow-x:hidden;}

/* ── 헤더 ── */
.app-hdr{
  position:sticky;top:0;z-index:200;
  background:var(--navy);color:#fff;
  height:var(--hdr-h);display:flex;align-items:center;
  padding:0 14px;gap:8px;
  box-shadow:0 2px 8px rgba(0,0,0,.25);
}
.hdr-title{flex:1;font-weight:900;font-size:16px;letter-spacing:-.3px;}
.hdr-btn{
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);
  color:#fff;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;
  cursor:pointer;white-space:nowrap;font-family:inherit;
}
.hdr-btn:active{background:rgba(255,255,255,.22);}

/* ── 탭 바 ── */
.tab-bar{
  position:sticky;top:var(--hdr-h);z-index:190;
  background:var(--navy);
  display:flex;border-top:1px solid rgba(255,255,255,.1);
}
.tab-btn{
  flex:1;padding:0;height:var(--tab-h);border:none;background:transparent;
  color:rgba(255,255,255,.55);font-size:12px;font-weight:700;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  border-bottom:3px solid transparent;transition:all .2s;font-family:inherit;
}
.tab-btn.active{color:#fff;border-bottom-color:var(--gold2);}
.tab-btn .tab-ico{font-size:18px;}

/* ── 탭 패널 ── */
.tab-panel{display:none;padding:14px;padding-bottom:80px;max-width:860px;margin:0 auto;}
.tab-panel.active{display:block;}

/* ── 카드 공통 ── */
.card{background:var(--card);border-radius:14px;border:1px solid var(--border);
  box-shadow:0 2px 10px rgba(0,0,0,.06);margin-bottom:16px;overflow:hidden;}
.card-hdr{background:var(--gold);color:#fff;padding:10px 16px;
  display:flex;justify-content:space-between;align-items:center;gap:8px;}
.card-hdr-title{font-weight:900;font-size:15px;}

/* ── 임명 관리 탭 ── */
.week-tabs-scroll{display:flex;gap:8px;overflow-x:auto;padding:4px 0 8px;margin-bottom:12px;scrollbar-width:none;}
.week-tabs-scroll::-webkit-scrollbar{display:none;}
.wtab{
  flex-shrink:0;padding:8px 14px;border-radius:20px;border:1.5px solid var(--border);
  background:var(--card);color:var(--text2);font-size:13px;font-weight:700;cursor:pointer;
  font-family:inherit;white-space:nowrap;transition:all .2s;
}
.wtab.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.wtab.past{opacity:.45;}

.section-badge{
  display:flex;align-items:center;gap:6px;
  padding:8px 14px;font-weight:900;font-size:13px;
  border-bottom:1px solid var(--border);
}
.badge-jewel{background:var(--jewel);color:var(--jewel-c);}
.badge-service{background:var(--service);color:var(--service-c);}
.badge-life{background:var(--life);color:var(--life-c);}

.item-row{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid #f0ece6;gap:10px;}
.item-row:last-child{border-bottom:none;}
.item-info{flex:1;min-width:0;}
.item-main{font-size:13.5px;font-weight:700;display:flex;align-items:baseline;gap:4px;flex-wrap:wrap;}
.item-num{color:var(--navy);flex-shrink:0;}
.item-ttl{flex:1;min-width:0;}
.item-min{font-size:12.5px;font-weight:700;color:var(--navy);flex-shrink:0;white-space:nowrap;}
.item-sub{font-size:11.5px;color:#1a5c8a;margin-top:2px;padding-left:14px;}
.name-wrap{flex-shrink:0;}
.name-inp{
  width:88px;padding:7px 8px;border:1.5px solid var(--border);border-radius:8px;
  font-size:13px;font-weight:700;text-align:center;font-family:inherit;
  background:var(--surface2);outline:none;
}
.name-inp:focus{border-color:var(--navy);background:#fff;}

.top-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);gap:8px;flex-wrap:wrap;}
.top-item{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;}
.small-inp{width:48px;padding:6px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;font-weight:800;text-align:center;font-family:inherit;background:var(--surface2);outline:none;}
.small-inp:focus{border-color:var(--navy);background:#fff;}
.mid-inp{width:88px;padding:6px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;font-weight:700;text-align:center;font-family:inherit;background:var(--surface2);outline:none;}
.mid-inp:focus{border-color:var(--navy);background:#fff;}

.footer-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface3);border-top:1.5px solid var(--border);gap:8px;flex-wrap:wrap;font-weight:700;font-size:13px;}

.note-box{padding:12px 14px;background:#fff9f0;border-top:1px solid #f0e5cc;font-size:13px;color:#7a5500;font-weight:700;text-align:center;}

/* ── 계획표 탭 ── */
.print-btn-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.print-btn{flex:1;min-width:90px;padding:12px 8px;border:none;border-radius:10px;
  color:#fff;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;}

.a4-preview{background:#fff;border:1px solid var(--border);border-radius:10px;
  padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:12px;
  font-family:'맑은 고딕','Malgun Gothic','Noto Sans KR',sans-serif;font-size:8.5pt;}
.preview-title{text-align:center;font-weight:900;font-size:12pt;border-bottom:2.5px double #000;padding-bottom:4px;margin-bottom:8px;}
.prev-week{margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid #1a3a9c;}
.prev-week:last-child{border-bottom:none;}
.prev-hdr{display:flex;justify-content:space-between;font-weight:700;font-size:9pt;border-bottom:1.5px solid #000;padding-bottom:3px;margin-bottom:3px;}
.prev-top{display:flex;justify-content:space-between;font-size:8pt;border-bottom:1px solid #ddd;padding:2px 0;margin-bottom:2px;}
.prev-sec{font-weight:900;font-size:8pt;padding:2px 4px;margin-top:3px;}
.prev-item{display:flex;justify-content:space-between;font-size:8pt;padding:1px 0;border-bottom:.5px solid #eee;}
.prev-item-name{border:1px solid #000;min-width:70px;text-align:center;font-weight:800;font-size:7.5pt;padding:0 3px;}
.prev-footer{display:flex;justify-content:space-between;font-weight:900;font-size:8pt;border-top:1.5px solid #000;padding-top:3px;margin-top:4px;}

/* ── 환영사 탭 ── */
.welcome-card{border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:14px;}
.welcome-hdr{background:var(--navy);color:#fff;padding:12px 16px;font-weight:900;font-size:14px;display:flex;justify-content:space-between;align-items:center;}
.welcome-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid #f0ece6;gap:10px;background:#fff;}
.welcome-row:last-child{border-bottom:none;}
.welcome-label{flex:1;font-size:14px;font-weight:700;}
.welcome-date{font-size:12px;color:var(--text3);}
.welcome-inp{width:110px;padding:8px 10px;border:1.5px solid var(--border);border-radius:9px;
  font-size:14px;font-weight:700;text-align:center;font-family:inherit;background:var(--surface2);outline:none;}
.welcome-inp:focus{border-color:var(--navy);background:#fff;}

/* ── 주간 보기 (읽기 전용) ── */
.view-week-nav{
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;margin-bottom:16px;
}
.view-nav-btn{
  width:44px;height:44px;border-radius:50%;border:2px solid var(--border);
  background:var(--card);color:var(--navy);font-size:20px;font-weight:900;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .18s;
}
.view-nav-btn:active{background:var(--navy);color:#fff;border-color:var(--navy);}
.view-nav-btn:disabled{opacity:.25;cursor:default;}
.view-week-label{
  flex:1;text-align:center;font-weight:900;font-size:15px;color:var(--navy);
  line-height:1.35;
}
.view-week-sub{font-size:12px;font-weight:500;color:var(--text3);margin-top:2px;}

.view-card{background:var(--card);border-radius:14px;border:1px solid var(--border);
  box-shadow:0 2px 10px rgba(0,0,0,.06);overflow:hidden;margin-bottom:14px;}
.view-card-hdr{

}
.view-hdr-week{font-weight:900;font-size:15px;}
.view-hdr-reading{font-size:12px;opacity:.8;margin-top:2px;}
.view-hdr-chair{font-size:13px;font-weight:700;opacity:.9;white-space:nowrap;}

.view-top-row{
  display:flex;align-items:center;gap:10px;padding:10px 16px;
  border-bottom:1px solid var(--border);font-size:13px;font-weight:700;
  background:var(--surface2);flex-wrap:wrap;
}
.view-top-item{display:flex;align-items:center;gap:5px;}
.view-pill{
  background:var(--navy);color:#fff;border-radius:12px;
  padding:3px 10px;font-size:13px;font-weight:800;
}

.view-section-badge{
  display:flex;align-items:center;gap:6px;
  padding:8px 16px;font-weight:900;font-size:13px;
  border-bottom:1px solid var(--border);border-top:1px solid var(--border);
}
.view-item-row{
  display:flex;align-items:center;padding:11px 16px;
  border-bottom:1px solid #f0ece6;gap:10px;
}
.view-item-row:last-child{border-bottom:none;}
.view-item-left{flex:1;min-width:0;}
.view-item-main{font-size:13.5px;font-weight:700;display:flex;align-items:baseline;gap:5px;flex-wrap:wrap;}
.view-item-num{color:var(--navy);flex-shrink:0;font-weight:900;}
.view-item-ttl{flex:1;}
.view-item-min{font-size:12px;font-weight:700;color:var(--navy);flex-shrink:0;white-space:nowrap;}
.view-item-sub{font-size:11.5px;color:#1a5c8a;margin-top:2px;padding-left:16px;}
.view-name-chip{
  flex-shrink:0;
  background:var(--jewel);color:var(--jewel-c);
  border-radius:10px;padding:5px 12px;
  font-size:13px;font-weight:900;min-width:72px;text-align:center;
  border:1.5px solid rgba(26,58,92,.15);
}
.view-name-chip.empty{background:var(--surface3);color:var(--text3);font-weight:500;}
.view-name-chip.service{background:var(--service);color:var(--service-c);}
.view-name-chip.life{background:var(--life);color:var(--life-c);}

.view-footer-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;background:var(--surface3);
  border-top:2px solid var(--navy);
  font-weight:700;font-size:13px;flex-wrap:wrap;gap:8px;
}
.view-note-box{
  padding:10px 16px;background:#fff9f0;
  border-bottom:1px solid #f0e5cc;
  font-size:13px;color:#7a5500;font-weight:700;
}

.view-empty{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px;}

/* ── FAB ── */
.fab-area{position:fixed;bottom:20px;right:16px;display:flex;flex-direction:column;gap:10px;z-index:300;}
.fab{width:52px;height:52px;border-radius:50%;border:none;font-size:22px;cursor:pointer;
  box-shadow:0 4px 16px rgba(0,0,0,.22);display:flex;align-items:center;justify-content:center;font-family:inherit;}

/* ── 토스트 ── */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  background:rgba(20,20,20,.88);color:#fff;padding:10px 18px;border-radius:20px;
  font-size:13px;pointer-events:none;opacity:0;transition:opacity .3s;z-index:9999;white-space:nowrap;}
#toast.show{opacity:1;}

/* ── 모달 ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;
  display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-bg.on{opacity:1;pointer-events:all;}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:85dvh;overflow-y:auto;}
.m-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 16px;}
.m-title{font-weight:900;font-size:17px;margin-bottom:14px;color:var(--navy);}
.m-field{margin-bottom:12px;}
.m-label{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:4px;}
.m-inp{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;
  font-size:15px;font-family:inherit;outline:none;}
.m-inp:focus{border-color:var(--navy);}
.m-acts{display:flex;gap:10px;margin-top:16px;}
.m-cancel{flex:1;padding:13px;border:1.5px solid var(--border);border-radius:10px;background:#fff;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;}
.m-save{flex:2;padding:13px;border:none;border-radius:10px;background:var(--navy);color:#fff;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;}

/* ── 프린트 ── */
@media print{
  .app-hdr,.tab-bar,.tab-panel:not(.print-target),.fab-area,#toast,.modal-bg{display:none!important;}
  .print-target{display:block!important;padding:0!important;}
  body{background:#fff;}
}
</style>
</head>
<body>

<!-- 헤더 -->
<header class="app-hdr">
  <div style="display:flex;flex-direction:column;flex:1;min-width:0;">
    <div class="hdr-title" style="flex:none;">🏛️ 경주동부 집회 임명표</div>
    <div id="fbStatusBadge" style="font-size:10px;opacity:0.5;color:#aef;font-weight:700;transition:opacity .4s;">☁️ 연결 중...</div>
  </div>
  <input type="file" id="docxFile" accept=".docx,.rtf,.zip" style="display:none" onchange="importDocx(event)">
  <button class="hdr-btn" onclick="document.getElementById('docxFile').click()">📄 교재 가져오기</button>
  <button class="hdr-btn" style="background:rgba(255,200,60,.2);border-color:rgba(255,200,60,.4)" onclick="openPasteModal()">📋 붙여넣기</button>
  <div style="position:relative">
    <button class="hdr-btn" onclick="toggleSaveDropdown(event)">⋯</button>
    <div id="saveDropdown" style="
      display:none;position:absolute;top:calc(100% + 8px);right:0;
      background:#fff;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.22);
      border:1px solid #e0d8cc;min-width:160px;z-index:400;overflow:hidden;">
      <button onclick="saveLocal();closeSaveDropdown()" style="width:100%;padding:13px 16px;border:none;background:none;text-align:left;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;border-bottom:1px solid #f0ece6;">💾 저장</button>
      <button onclick="loadLocal();closeSaveDropdown()" style="width:100%;padding:13px 16px;border:none;background:none;text-align:left;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;border-bottom:1px solid #f0ece6;">📂 불러오기</button>
      <button onclick="exportJSON();closeSaveDropdown()" style="width:100%;padding:13px 16px;border:none;background:none;text-align:left;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;border-bottom:1px solid #f0ece6;">📤 JSON 내보내기</button>
      <button onclick="document.getElementById('jsonFile').click();closeSaveDropdown()" style="width:100%;padding:13px 16px;border:none;background:none;text-align:left;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">📥 JSON 가져오기</button>
    </div>
  </div>
</header>

<!-- 탭 바 -->
<nav class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('manage')" id="tab-manage">
    <span class="tab-ico">📋</span>
    <span>집회 임명</span>
  </button>
  <button class="tab-btn" onclick="switchTab('plan')" id="tab-plan">
    <span class="tab-ico">📅</span>
    <span>계획표</span>
  </button>
  <button class="tab-btn" onclick="switchTab('welcome')" id="tab-welcome">
    <span class="tab-ico">🎤</span>
    <span>환영사</span>
  </button>
  <button class="tab-btn" onclick="switchTab('view')" id="tab-view">
    <span class="tab-ico">👁️</span>
    <span>주간 보기</span>
  </button>
</nav>

<!-- ══ 탭1: 집회 임명 관리 ══ -->
<div class="tab-panel active" id="panel-manage">
  <div class="week-tabs-scroll" id="weekTabsScroll"></div>

function init(){

    catch(e){ D=DEFAULT_DATA; }

function isPast(w){
  if(!w.startDate) return false;
  const today = new Date().toISOString().slice(0,10);
  const end = new Date(w.startDate);
  end.setDate(end.getDate()+6);
  return end.toISOString().slice(0,10) < today;
}

function renderWeekTabs(){
  const sc = document.getElementById('weekTabsScroll');
  sc.innerHTML = D.map((w,i)=>{
    const past = isPast(w);
    return `<button class="wtab${i===curWeekIdx?' active':''}${past?' past':''}" onclick="selectWeek(${i})">${w.week||'(날짜없음)'}</button>`;
  }).join('');
  // 현재 탭으로 스크롤
  setTimeout(()=>{
    const btns = sc.querySelectorAll('.wtab');
    if(btns[curWeekIdx]) btns[curWeekIdx].scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  },50);
}

function renderPlan(){
  const el = document.getElementById('planContent');
  if(!D.length){ el.innerHTML='<div style="text-align:center;padding:40px;color:var(--text3)">데이터가 없습니다</div>'; return; }

  const sIcon={jewel:'💎',service:'🌿',life:'🏠'};
  const sName={jewel:'성경에 담긴 보물',service:'야외 봉사에 힘쓰십시오',life:'그리스도인 생활'};
  const sBg  ={jewel:'#ddeeff',service:'#e8f5e9',life:'#fff8e1'};
  const sCol ={jewel:'#1a3a5c',service:'#2e7d32',life:'#b45000'};

  // 2개씩 그룹
  const visible = D.filter(w=>!isPast(w));
  let html = '';
  for(let i=0;i<visible.length;i+=2){
    const weeks = [visible[i], visible[i+1]].filter(Boolean);
    html += `<div class="a4-preview">
      ${i===0?'<div class="preview-title">평일 집회 계획표</div>':''}
      ${weeks.map(w=>{
        let lastType='';
        let itemsH = (w.items||[]).map(item=>{
          let sh='';
          if(item.type!==lastType){
            if(item.type==='life'){
              sh=`<div class="prev-sec" style="background:${sBg.life};color:${sCol.life};">${sIcon.life} ${sName.life}　🎵 노래 ${w.song2||''}</div>`;
            } else {
              sh=`<div class="prev-sec" style="background:${sBg[item.type]};color:${sCol[item.type]};">${sIcon[item.type]} ${sName[item.type]}</div>`;
            }
            lastType=item.type;
          }
          return sh+`<div class="prev-item">
            <span>${item.no}. ${item.title}${item.sub?' <span style="color:#1a5c8a">'+item.sub+'</span>':''} <span style="color:#888;font-weight:400">${item.min?'('+item.min+'분)':''}</span></span>
            <span class="prev-item-name">${item.who||''}</span>
          </div>`;
        }).join('');
        return `<div class="prev-week">
          <div class="prev-hdr">
            <span>📅 ${w.week}${w.reading?'　'+w.reading:''}</span>
            <span>사회자: <b>${w.chair||''}</b></span>
          </div>
          <div class="prev-top">
            <span>🎵 노래 ${w.song1||''}　🙏 기도: ${w.prayerOpen||''}　소개말(1분)</span>
          </div>
          ${w.note?`<div style="background:#fff9e6;padding:2px 4px;font-size:7.5pt;color:#7a5500;">📌 ${w.note}</div>`:''}
          ${itemsH}
          <div class="prev-footer">
            <span>맺음말(3분)</span>
            <span>🎵 노래 ${w.song3||''}</span>
            <span>🙏 기도: ${w.prayerClose||''}</span>
          </div>
        </div>`;
      }).join('<hr style="border:none;border-top:2px dashed #1a3a9c;margin:6px 0">')}
    </div>`;
  }
  el.innerHTML = html;
}

function printPlan(){
  const visible = D.filter(w=>!isPast(w));
  if(!visible.length){toast('표시할 주간이 없습니다');return;}
  const html = buildPrintHtml(visible, true);
  const w=window.open('','_blank');
  w.document.write(html); w.document.close();
}
function exportPDF(){
  const visible = D.filter(w=>!isPast(w));
  if(!visible.length){toast('표시할 주간이 없습니다');return;}
  const html = buildPrintHtml(visible, false);
  const w=window.open('','_blank');

}
function buildPrintHtml(weeks, autoprint){
  const sIcon={jewel:'💎',service:'🌿',life:'🏠'};
  const sName={jewel:'성경에 담긴 보물',service:'야외 봉사에 힘쓰십시오',life:'그리스도인 생활'};
  const sBg  ={jewel:'#ddeeff',service:'#e8f5e9',life:'#fff8e1'};
  const sCol ={jewel:'#1a3a5c',service:'#2e7d32',life:'#b45000'};
  const box = (v,w)=>`<span style="border:1px solid #000;display:inline-flex;align-items:center;justify-content:center;height:18px;min-width:${w||'80px'};font-weight:800;font-size:7.5pt;padding:0 3px">${v||''}</span>`;

  let pages='';
  for(let i=0;i<weeks.length;i+=2){
    const w1=weeks[i], w2=weeks[i+1];

    const cardHtml = (w)=>{
      let lastType='';
      // 각 항목에 flex:1 → 남은 공간을 균등 배분해 간격이 자동으로 넓어짐
      let itemsH=(w.items||[]).map(item=>{
        let sh='';
        if(item.type!==lastType){
          if(item.type==='life')
            sh=`<div style="flex-shrink:0;background:${sBg.life};color:${sCol.life};font-weight:900;font-size:8pt;padding:3px 6px;border-bottom:1px solid #bbb;">${sIcon.life} ${sName.life}　🎵 노래 ${w.song2||''}</div>`;
          else
            sh=`<div style="flex-shrink:0;background:${sBg[item.type]};color:${sCol[item.type]};font-weight:900;font-size:8pt;padding:3px 6px;border-bottom:1px solid #bbb;">${sIcon[item.type]} ${sName[item.type]}</div>`;
          lastType=item.type;
        }
        return sh+`<div style="flex:1;min-height:0;display:flex;justify-content:space-between;align-items:center;padding:0 4px;border-bottom:.5px solid #e0dbd4;">
          <div style="flex:1;font-weight:700;font-size:8pt;padding:2px 0;">
            ${item.no}. ${item.title}${item.sub?` <span style="color:#1a5c8a">${item.sub}</span>`:''}<span style="color:#1a3a5c;font-weight:800;"> ${item.min?'('+item.min+'분)':''}</span>
          </div>
          ${box(item.who)}
        </div>`;
      }).join('');

      return `<div style="display:flex;flex-direction:column;height:100%;font-family:'맑은 고딕','Malgun Gothic','Noto Sans KR',sans-serif;">
        <div style="flex-shrink:0;background:#1a3a5c;color:#fff;padding:4px 7px;display:flex;justify-content:space-between;align-items:center;">
          <span style="font-weight:900;font-size:9.5pt;">📅 ${w.week}${w.reading?'　'+w.reading:''}</span>
          <span style="font-weight:700;font-size:8.5pt;">사회자: ${box(w.chair,'76px')}</span>
        </div>
        <div style="flex-shrink:0;display:flex;justify-content:space-between;align-items:center;padding:3px 5px;border-bottom:1px solid #999;font-weight:700;font-size:8pt;">
          <span>🎵 노래 ${box(w.song1,'32px')}</span>
          <span>🙏 기도 ${box(w.prayerOpen,'76px')}</span>
          <span>소개말(1분)</span>
        </div>
        ${w.note?`<div style="flex-shrink:0;background:#fff9e6;padding:2px 5px;font-size:7.5pt;color:#7a5500;font-weight:700;">📌 ${w.note}</div>`:''}
        <div style="flex:1;min-height:0;display:flex;flex-direction:column;">${itemsH}</div>
        <div style="flex-shrink:0;display:flex;justify-content:space-between;align-items:center;border-top:2px solid #1a3a5c;padding:3px 5px;font-weight:900;font-size:8pt;">
          <span>맺음말(3분)</span>
          <span>🎵 노래 ${w.song3||''}</span>
          <span>🙏 기도 ${box(w.prayerClose,'76px')}</span>
        </div>
      </div>`;
    };

    const titleHtml = i===0
      ? `<div style="flex-shrink:0;text-align:center;font-weight:900;font-size:11pt;border-bottom:2.5px double #000;padding-bottom:3px;margin-bottom:4px;font-family:'맑은 고딕','Malgun Gothic',sans-serif;">평일 집회 계획표</div>`
      : '';
    pages+=`<div style="width:210mm;height:297mm;padding:5mm 7mm;box-sizing:border-box;page-break-after:always;display:flex;flex-direction:column;">
      ${titleHtml}
      <div style="flex:1;min-height:0;display:flex;flex-direction:column;">${cardHtml(w1)}</div>
      <div style="flex-shrink:0;border-top:2px dashed #1a3a9c;margin:2mm 0;"></div>
      <div style="flex:1;min-height:0;display:flex;flex-direction:column;">${w2?cardHtml(w2):'<div style="flex:1"></div>'}</div>
    </div>`;
  }
  const onload = autoprint?' onload="window.print()"':'';
  return `<!DOCTYPE html><html><head><meta charset="UTF-8">
  <style>
    *{box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    html,body{margin:0;padding:0;}
    @page{size:A4 portrait;margin:0;}
  </style>
  </head><body${onload}>${pages}</body></html>`;
}



function exportWord(){
  const visible = D.filter(w=>!isPast(w));
  if(!visible.length){toast('표시할 주간이 없습니다');return;}

  const sIcon={jewel:'💎',service:'🌿',life:'🏠'};
  const sName={jewel:'성경에 담긴 보물',service:'야외 봉사에 힘쓰십시오',life:'그리스도인 생활'};
  const sBg  ={jewel:'#ddeeff',service:'#e8f5e9',life:'#fff8e1'};

  const F  = "font-family:'맑은 고딕','Malgun Gothic',Arial,sans-serif;";
  // 패딩·폰트 극소화 → A4 절반(약 130mm)에 꼭 맞게
  const TD = `${F}font-size:7.5pt;padding:1px 4px;border:none;line-height:1.25;`;
  const TDR= `${F}font-size:7.5pt;padding:1px 4px;border:none;line-height:1.25;width:88px;text-align:right;`;

  function weekTable(w){
    let lastType='';
    const itemsH=(w.items||[]).map(item=>{
      let sh='';
      if(item.type!==lastType){
        const bg = sBg[item.type]||sBg.life;
        const label = item.type==='life'
          ? `${sIcon.life} ${sName.life}&nbsp;&nbsp;🎵 노래 ${w.song2||''}`
          : `${sIcon[item.type]} ${sName[item.type]}`;
        sh=`<tr><td colspan="2" style="${TD}background:${bg};font-weight:900;padding:2px 4px;">${label}</td></tr>`;
        lastType=item.type;
      }
      const minStr = item.min ? ` <b style="color:#1a3a5c;">(${item.min}분)</b>` : '';
      const subStr = item.sub ? ` <span style="color:#1a5c8a;">${item.sub}</span>` : '';
      return sh+`<tr>
        <td style="${TD}padding:4px 4px;">${item.no}. <b>${item.title}</b>${subStr}${minStr}</td>
        <td style="${TDR}font-weight:800;padding:4px 4px;">${item.who||''}</td>
      </tr>`;
    }).join('');

    return `<table style="width:100%;border-collapse:collapse;${F}font-size:7.5pt;margin:0;mso-table-lspace:0;mso-table-rspace:0;">
      <tr style="background:#1a3a5c;">
        <td style="${TD}font-weight:900;font-size:9pt;color:#fff;padding:3px 5px;line-height:1.3;">
          📅 ${w.week}${w.reading?'&nbsp;&nbsp;'+w.reading:''}
        </td>
        <td style="${TDR}font-weight:900;font-size:8.5pt;color:#fff;padding:3px 5px;line-height:1.3;">
          사회자: ${w.chair||''}
        </td>
      </tr>
      <tr style="border-bottom:1px solid #999;">
        <td colspan="2" style="${TD}font-weight:700;padding:2px 4px;">
          🎵 노래 ${w.song1||''}&nbsp;&nbsp;🙏 기도: ${w.prayerOpen||''}&nbsp;&nbsp;소개말(1분)
        </td>
      </tr>
      ${w.note?`<tr><td colspan="2" style="${TD}background:#fff9e6;color:#7a5500;font-weight:700;">📌 ${w.note}</td></tr>`:''}
      ${itemsH}
      <tr style="border-top:1.5px solid #1a3a5c;">
        <td style="${TD}font-weight:900;padding:2px 4px;">맺음말(3분)&nbsp;&nbsp;🎵 노래 ${w.song3||''}</td>
        <td style="${TDR}font-weight:900;padding:2px 4px;">🙏 기도: ${w.prayerClose||''}</td>
      </tr>
    </table>`;
  }

  // 정확히 A4 절반 구분 (점선 + 최소 여백)
  const divider=`<table style="width:100%;border-collapse:collapse;margin:3px 0;">
    <tr><td style="border-top:2px dashed #1a3a9c;padding:0;height:0;font-size:0;line-height:0;"></td></tr>
  </table>`;

  const pageBreakPara=`<p style="page-break-before:always;margin:0;font-size:1pt;line-height:1pt;mso-line-height-rule:exactly;">&nbsp;</p>`;

  let body='';
  body+=`<p style="text-align:center;${F}font-size:11pt;font-weight:900;border-bottom:2.5px double #000;margin:0 0 4px;padding-bottom:2px;line-height:1.3;">경주동부 평일 집회 계획표</p>`;

  for(let i=0;i<visible.length;i+=2){
    if(i>0) body+=pageBreakPara;
    body+=weekTable(visible[i]);
    if(visible[i+1]){
      body+=divider;
      body+=weekTable(visible[i+1]);
    }
  }

  const html=`<html xmlns:o="urn:schemas-microsoft-com:office:office"
    xmlns:w="urn:schemas-microsoft-com:office:word"
    xmlns="http://www.w3.org/TR/REC-html40">
  <head><meta charset="UTF-8">
  <!--[if gte mso 9]><xml>
  <w:WordDocument>
    <w:View>Print</w:View>
    <w:Zoom>100</w:Zoom>
    <w:DoNotOptimizeForBrowser/>
  </w:WordDocument>
  </xml><![endif]-->
  <style>
    @page WordSection1 {
      size:210mm 297mm;
      margin:10mm 12mm 10mm 12mm;
      mso-page-orientation:portrait;
    }
    body {
      ${F}
      font-size:7.5pt;
      margin:0;
      padding:0;
      mso-pagination:widow-orphan lines-together;
      div:WordSection1;
    }
    p  { margin:0; padding:0; line-height:1.2; }
    td { border:none; vertical-align:middle; mso-line-height-rule:exactly; }
    tr { mso-row-empty-cells:ignore; }
    table { border-collapse:collapse; width:100%; mso-table-lspace:0pt; mso-table-rspace:0pt; }
  </style>
  </head>
  <body>
  <div class="WordSection1">
  ${body}
  </div>
  </body></html>`;

  const blob=new Blob(['\ufeff'+html],{type:'application/msword;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='경주동부_집회계획표.doc'; a.click();
  URL.revokeObjectURL(url);
  toast('📝 워드 저장됨');
}

let welcomeWeekIdx = 0;
let viewWeekIdx = 0;
window.welcomeWeekIdx = 0;
window.viewWeekIdx = 0;

function renderWelcome(){
  // 주간 탭
  const sc = document.getElementById('welcomeWeekTabs');
  if(!sc) return;
  sc.innerHTML = D.map((w,i)=>{
    const past = isPast(w);
    return `<button class="wtab${i===welcomeWeekIdx?' active':''}${past?' past':''}" onclick="selectWelcomeWeek(${i})">${w.week||'(날짜없음)'}</button>`;
  }).join('');
  setTimeout(()=>{
    const btns = sc.querySelectorAll('.wtab');
    if(btns[welcomeWeekIdx]) btns[welcomeWeekIdx].scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  },50);

  // 환영사 담당자 입력값 복원
  const w = D[welcomeWeekIdx];
  const inp = document.getElementById('welcomeWho');
  if(inp && w) inp.value = w.welcomeWho || '';

  // 임명 현황 렌더
  renderWelcomeSummary();
}

function selectWelcomeWeek(i){
  welcomeWeekIdx = i;

}

  if(D[welcomeWeekIdx]){ D[welcomeWeekIdx].welcomeWho = val; window.D=D; if(window.fbSave) window.fbSave(); }
}

// ══════════════════════════════════
function openPasteModal(){
  document.getElementById('pasteInput').value='';
  document.getElementById('pasteModal').classList.add('on');
  setTimeout(()=>document.getElementById('pasteInput').focus(),200);
}

function processPaste(){
  const raw = document.getElementById('pasteInput').value.trim();
  if(!raw){ toast('내용을 붙여넣어 주세요'); return; }

  const lines = raw.split('\n').map(l=>l.trim()).filter(l=>l.length>0);

  // 1. 날짜
  let weekStr='', startDate='', reading='';
  const dateLine = lines[0];
  const dateMatch = dateLine.match(/(\d+)월\s*(\d+)/);
  if(dateMatch){
    weekStr = dateLine;
    const mon = dateMatch[1].padStart(2,'0');
    const day = dateMatch[2].padStart(2,'0');
    startDate = `2026-${mon}-${day}`;
  } else { toast('⚠ 첫 줄에 날짜를 확인해주세요'); return; }

  // 2. 성경 범위 (두 번째 줄 - 숫자/노래/섹션이 아니면)
  if(lines[1] && !lines[1].match(/^노래/) && !lines[1].match(/^\d+\./) && !lines[1].match(/^성경에/)){
    reading = lines[1];
  }

  // 3. 노래 번호
  const songNums=[];
  lines.forEach(l=>{ const m=l.match(/노래\s*(\d+)/); if(m) songNums.push(m[1]); });
  const song1=songNums[0]||'', song2=songNums.length>=3?songNums[1]:'', song3=songNums[songNums.length-1]||'';

  // 4. 항목 파싱
  const items=[];
  let sectionType='jewel';
  for(let i=0;i<lines.length;i++){
    const l=lines[i];
    if(/성경에 담긴 보물/.test(l)) { sectionType='jewel'; continue; }
    if(/야외 봉사에 힘쓰십시오/.test(l)) { sectionType='service'; continue; }
    if(/그리스도인 생활/.test(l)&&l.length<20) { sectionType='life'; continue; }

    const numMatch = l.match(/^(\d+)\.\s+(.+)/);
    if(!numMatch) continue;
    const no = parseInt(numMatch[1]);
    if(no > 15) continue;
    let title = numMatch[2].trim();
    let min=0, sub='';

    // 제목 안에 (N분) 포함된 경우
    const inlineTime = title.match(/\((\d+)분\)/);
    if(inlineTime){
      min = parseInt(inlineTime[1]);
      const tidx = title.indexOf(inlineTime[0]);
      sub = title.slice(tidx+inlineTime[0].length).trim();
      title = title.slice(0,tidx).trim();
    }
    // 다음 줄이 (N분) 형식이면 시간+sub
    if(!min && i+1<lines.length){
      const nextLine = lines[i+1];
      const tm = nextLine.match(/^\((\d+)분\)\s*(.*)/);
      if(tm){ min=parseInt(tm[1]); sub=tm[2].trim(); i++; }
    }

    // 섹션 자동 분류
    let type=sectionType;
    if(/영적 보물 찾기|성경 낭독|담긴 보물/.test(title)) type='jewel';
    else if(/대화 시작하기|관심이 자라도록|연설|제자가|우리의 신앙/.test(title)) type='service';
    else if(/회중 성서 연구|개인 연구|토의|동영상/.test(title)) type='life';

    if(/소개말|맺음말/.test(title)) continue;

    items.push({no, type, title, sub, min, who:''});
  }

  if(!items.length){ toast('⚠ 항목을 인식하지 못했습니다'); return; }

  const w = {week:weekStr, startDate, reading, note:'',
    chair:'', song1, song2, song3, prayerOpen:'', prayerClose:'', items};

  const idx = D.findIndex(x=>x.startDate===startDate||x.week===weekStr);
  if(idx>=0){
    if(!confirm(`"${weekStr}" 주간이 이미 있습니다. 교재 내용을 업데이트할까요?\n(담당자 이름은 유지됩니다)`)) return;
    // 이름 유지, 교재 내용만 갱신
    D[idx].reading = reading||D[idx].reading;
    D[idx].song1 = song1||D[idx].song1;
    D[idx].song2 = song2||D[idx].song2;
    D[idx].song3 = song3||D[idx].song3;
    items.forEach((it,i)=>{
      if(D[idx].items[i]){ D[idx].items[i].title=it.title; D[idx].items[i].min=it.min||D[idx].items[i].min; D[idx].items[i].type=it.type; D[idx].items[i].sub=it.sub; }
      else D[idx].items.push(it);
    });
    curWeekIdx=idx;
    toast(`✅ "${weekStr}" 업데이트됨 (항목 ${items.length}개)`);
  } else {
    const insertAt=D.findIndex(x=>x.startDate>startDate);
    if(insertAt>=0) D.splice(insertAt,0,w); else D.push(w);
    curWeekIdx=D.findIndex(x=>x.startDate===startDate);
    toast(`✅ "${weekStr}" 추가됨 (항목 ${items.length}개, 노래 ${song1}·${song2}·${song3})`);
  }

  closeModal('pasteModal');
  saveLocal(); renderAll();
}


function parseRtf(arrayBuffer){
  const bytes=new Uint8Array(arrayBuffer);
  let raw='';
  for(let i=0;i<bytes.length;i++) raw+=String.fromCharCode(bytes[i]);
  let text=raw.replace(/\\u(-?\d+)\?/g,(_,n)=>{
    let code=parseInt(n); if(code<0) code+=65536;
    try{return String.fromCharCode(code);}catch(e){return '';}
  });
  text=text.replace(/\\par\b/g,'\n');
  text=text.replace(/\\[a-z]+[-]?\d*\s?/g,'');
  text=text.replace(/\\\'[0-9a-fA-F]{2}/g,'');
  text=text.replace(/[\{\}\\]/g,'');
  text=text.replace(/\*HYPERLINK\s*"[^"]*"\s*/g,'');
  text=text.replace(/HYPERLINK\s*"[^"]*"\s*/g,'');
  text=text.replace(/[ \t]+/g,' ');
  return text;
}

// ══════════════════════════════════
// JW 교재 파서
// ══════════════════════════════════
function parseJwDocx(text){
  const lines=text.split(/\r?\n/).map(l=>l.trim()).filter(l=>l);
  const reWeek=/(\d+월\s*\d+[-~–]\s*\d+일)/;
  const reSong=/(?:♬\s*)?노래\s*(\d+)/;
  const reJewel=/성경에 담긴 보물|영적 보물 찾기|성경 낭독/;
  const reService=/대화 시작하기|관심이 자라도록|우리의 신앙|제자가 되도록|봉사 감독자|연설/;
  const reLife=/그리스도인 생활|회중 성서 연구|회중의 필요|토의|동영상|개인 연구/;

  let blocks=[], blockStart=-1, weekLabel='';
  for(let i=0;i<lines.length;i++){
    const wm=lines[i].match(reWeek);
    if(wm){
      if(blockStart>=0) blocks.push({label:weekLabel,lines:lines.slice(blockStart,i)});
      blockStart=i; weekLabel=wm[1].trim();
    }
  }
  if(blockStart>=0) blocks.push({label:weekLabel,lines:lines.slice(blockStart)});

  const results=[];
  for(const block of blocks){
    const blines=block.lines;
    const weekStr=block.label;
    const dm=weekStr.match(/(\d+)월\s*(\d+)/);
    let startDate='';
    if(dm) startDate=`2026-${dm[1].padStart(2,'0')}-${dm[2].padStart(2,'0')}`;

    // 성경읽기
    let reading='';
    for(const l of blines){
      const rm2=l.match(/\(([^)]*(?:이사야|창세기|출애굽기|레위기|민수기|신명기|마태|마가|누가|요한|사도|로마|고린도)[^)]*)\)/);
      if(rm2){reading=rm2[1].trim();break;}
      const rm=l.match(/(이사야|창세기|출애굽기|레위기|민수기|신명기|마태|마가|누가|요한|사도|로마|고린도|요한계시록)\s*[\d:.-]+장?/);
      if(rm&&l.length<60){reading=rm[0].trim();break;}
    }

    // 노래
    let songs=[];
    for(const l of blines){
      const sm=l.match(/(?:♬\s*)?노래\s*(\d+)/g);
      if(sm) sm.forEach(s=>{const n=s.match(/\d+/);if(n)songs.push(n[0]);});
    }

    // 항목
    const items=[];
    let sectionType='jewel';
    for(const l of blines){
      if(/성경에 담긴 보물/.test(l)&&l.length<25){sectionType='jewel';continue;}
      if(/야외 봉사에 힘쓰십시오/.test(l)){sectionType='service';continue;}
      if(/그리스도인 생활/.test(l)&&l.length<20){sectionType='life';continue;}
      const im=l.match(/^(\d+)[.)．。]?\s*(.+?)(?:\s*\((\d+)분\))?\s*$/);
      if(im&&parseInt(im[1])<=15){
        const no=parseInt(im[1]);
        let title=im[2].replace(/\(\d+분\)/g,'').trim();
        const min=im[3]?parseInt(im[3]):0;
        let type=sectionType;
        if(reJewel.test(title))type='jewel';
        else if(reService.test(title))type='service';
        else if(reLife.test(title))type='life';
        if(/소개말|맺음말/.test(title))continue;
        if(/^노래\s*\d+/.test(title)||/^♬/.test(title))continue;
        items.push({no,type,title,sub:'',min,who:''});
      }
      if(/회중 성서 연구/.test(l)&&!items.find(x=>x.title.includes('회중 성서 연구'))){
        const mm=l.match(/(\d+)분/);
        items.push({no:items.length+1,type:'life',title:'회중 성서 연구',sub:'',min:mm?parseInt(mm[1]):30,who:''});
      }
    }
    if(items.length>0){
      results.push({week:weekStr,startDate,reading,
        song1:songs[0]||'',song2:songs[1]||'',song3:songs[2]||'',
        chair:'',prayerOpen:'',prayerClose:'',note:'',items});
    }
  }
  return results;
}

// ══════════════════════════════════
// 교재 가져오기
// ══════════════════════════════════
let _pendingImport=null;
function importDocx(event){
  const file=event.target.files[0];
  if(!file) return;
  toast('📄 파일 읽는 중...');
  const ext=file.name.toLowerCase().split('.').pop();
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      if(ext==='zip'){
        await importZip(e.target.result);
      } else {
        let text;
        if(ext==='rtf') text=parseRtf(e.target.result);
        else { const r=await mammoth.extractRawText({arrayBuffer:e.target.result}); text=r.value; }
        const parsed=parseJwDocx(text);
        if(!parsed||!parsed.length){toast('⚠ 교재 형식을 인식하지 못했습니다');document.getElementById('docxFile').value='';return;}
        _pendingImport=parsed; showImportPreview(parsed);
      }
    }catch(err){toast('⚠ 읽기 실패: '+err.message);document.getElementById('docxFile').value='';}
  };
  reader.readAsArrayBuffer(file);
}
async function importZip(arrayBuffer){
  const zip=await JSZip.loadAsync(arrayBuffer);
  const files=[]; zip.forEach((path,entry)=>{const ext=path.toLowerCase().split('.').pop();if((ext==='rtf'||ext==='docx')&&!entry.dir)files.push({path,entry,ext});});
  if(!files.length){toast('⚠ zip 안에 RTF/DOCX 없음');document.getElementById('docxFile').value='';return;}
  toast(`📦 ${files.length}개 파일 처리 중...`);
  const allParsed=[];
  for(const {entry,ext} of files){
    try{
      const ab=await entry.async('arraybuffer');
      let text; if(ext==='rtf') text=parseRtf(ab); else{const r=await mammoth.extractRawText({arrayBuffer:ab});text=r.value;}
      const parsed=parseJwDocx(text); if(parsed&&parsed.length) allParsed.push(...parsed);
    }catch(e){}
  }
  if(!allParsed.length){toast('⚠ 인식 가능한 교재 없음');document.getElementById('docxFile').value='';return;}
  allParsed.sort((a,b)=>(a.startDate||'').localeCompare(b.startDate||''));
  const seen=new Set(); const unique=allParsed.filter(w=>{if(seen.has(w.startDate))return false;seen.add(w.startDate);return true;});
  _pendingImport=unique; showImportPreview(unique);
}
function showImportPreview(parsed){
  document.getElementById('importPreview').innerHTML=parsed.map(w=>`
    <div style="margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)">
      <div style="font-weight:700;color:var(--navy)">📅 ${w.week} ${w.reading?'— '+w.reading:''}</div>
      <div style="font-size:11px;color:var(--text3);margin:3px 0">노래 ${w.song1||'?'} / ${w.song2||'?'} / ${w.song3||'?'}</div>
      ${w.items.map(it=>`<div style="font-size:12px;color:var(--text2)">${it.no}. ${it.title} ${it.min?'('+it.min+'분)':''}</div>`).join('')}
    </div>`).join('');
  document.getElementById('importConfirmBtn').textContent=`✅ ${parsed.length}개 주간 가져오기`;
  document.getElementById('importModal').classList.add('on');
}
function confirmImport(){
  if(!_pendingImport) return;
  let added=0,updated=0;
  for(const pw of _pendingImport){
    const idx=D.findIndex(w=>w.startDate===pw.startDate||w.week===pw.week);
    if(idx>=0){
      D[idx].reading=pw.reading||D[idx].reading;
      D[idx].song1=pw.song1||D[idx].song1; D[idx].song2=pw.song2||D[idx].song2; D[idx].song3=pw.song3||D[idx].song3;
      pw.items.forEach((pi,i)=>{if(D[idx].items[i]){D[idx].items[i].title=pi.title;D[idx].items[i].min=pi.min||D[idx].items[i].min;D[idx].items[i].type=pi.type;}else D[idx].items.push(pi);});
      updated++;
    } else {
      const insertAt=D.findIndex(w=>w.startDate>pw.startDate);
      if(insertAt>=0) D.splice(insertAt,0,pw); else D.push(pw);
      added++;
    }
  }
  closeModal('importModal'); document.getElementById('docxFile').value='';
  saveLocal(); renderAll(); toast(`✅ ${updated}개 업데이트 / ${added}개 추가`);
  _pendingImport=null;
}

  html += `<div class="view-top-row">
    <div class="view-top-item">🎵 <span class="view-pill">${w.song1||'—'}</span></div>
    <div class="view-top-item">🙏 기도
      <span style="font-weight:900;color:var(--navy)">${w.prayerOpen||'—'}</span>
    </div>
    <div style="font-size:12px;color:var(--text3);margin-left:auto">소개말(1분)</div>
  </div>`;

  // 항목들
  let lastType = '';
  (w.items||[]).forEach(item=>{
    if(item.type !== lastType){
      if(item.type==='life'){
        html += `<div class="view-section-badge badge-life">
          <span>🏠 ${sectionName.life}</span>
          <span style="margin-left:auto;font-size:12px;">🎵 노래 <b>${w.song2||'—'}</b></span>
        </div>`;
      } else {
        html += `<div class="view-section-badge ${sectionCls[item.type]}">${sectionIcon[item.type]} ${sectionName[item.type]}</div>`;
      }
      lastType = item.type;
    }
    const nameEmpty = !item.who;
    html += `<div class="view-item-row">
      <div class="view-item-left">
        <div class="view-item-main">
          <span class="view-item-num">${item.no}.</span>
          <span class="view-item-ttl">${item.title}</span>
          ${item.min?`<span class="view-item-min">(${item.min}분)</span>`:''}
        </div>
        ${item.sub?`<div class="view-item-sub">${item.sub}</div>`:''}
      </div>
      <div class="view-name-chip ${nameEmpty?'empty':chipCls[item.type]||''}">
        ${item.who||'미정'}
      </div>
    </div>`;
  });

  // 맺음말 행
  html += `<div class="view-footer-row">
    <span>맺음말(3분)</span>
    <div class="view-top-item">🎵 <span class="view-pill">${w.song3||'—'}</span></div>
    <div class="view-top-item">🙏 기도
      <span style="font-weight:900;color:var(--navy)">${w.prayerClose||'—'}</span>
    </div>
  </div>`;

  html += `</div>`;

  // 주간 인덱스 표시 도트
  const dots = D.map((_,i)=>`<span style="
    width:${i===viewWeekIdx?20:7}px;height:7px;border-radius:4px;
    background:${i===viewWeekIdx?'var(--navy)':'var(--border)'};
    transition:all .2s;display:inline-block;"></span>`).join('');
  html += `<div style="display:flex;align-items:center;justify-content:center;gap:5px;padding:4px 0 8px;">${dots}</div>`;

  contentEl.innerHTML = html;
}

// ══════════════════════════════════
// PWA
// ══════════════════════════════════
(function initPWA(){
  function makeIcon(size){
    const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 100 100"><rect width="100" height="100" rx="18" fill="#1a3a5c"/><text x="50" y="40" text-anchor="middle" font-size="26" fill="#fff" font-family="sans-serif" font-weight="bold">집회</text><text x="50" y="70" text-anchor="middle" font-size="26" fill="#f0c040" font-family="sans-serif" font-weight="bold">임명표</text></svg>`;
    return 'data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(svg)));
  }
  const manifest={name:'경주동부 집회 임명표',short_name:'집회 임명표',description:'평일 집회 임명표 관리',start_url:'.',display:'standalone',background_color:'#f0f2f5',theme_color:'#1a3a5c',lang:'ko',icons:[{src:makeIcon(192),sizes:'192x192',type:'image/svg+xml'},{src:makeIcon(512),sizes:'512x512',type:'image/svg+xml'}]};
  const mBlob=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
  document.getElementById('pwaManifest').href=URL.createObjectURL(mBlob);
  const swCode=`const C='jiboe-v1';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll([self.location.href])).then(()=>self.skipWaiting()));});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))).then(()=>self.clients.claim()));});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match(self.location.href))));});`;
  if('serviceWorker' in navigator){
    const swBlob=new Blob([swCode],{type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(swBlob),{scope:'./'}).catch(()=>{});
  }
})();

// ── 시작
init();
</script>
